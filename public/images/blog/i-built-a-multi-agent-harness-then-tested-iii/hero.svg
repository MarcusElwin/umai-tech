    <rect x="830" y="386" width="125" height="70" rx="18" fill="#1E293B" stroke="#475569"/>
    <text x="858" y="417" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="720">Policy</text>
    <text x="858" y="438" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">gate calls</text>

    <rect x="977" y="386" width="125" height="70" rx="18" fill="#1E293B" stroke="#475569"/>
    <text x="1005" y="417" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="720">Budget</text>
    <text x="1005" y="438" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">cap spend</text>

    <rect x="1125" y="386" width="125" height="70" rx="18" fill="#1E293B" stroke="#475569"/>
    <text x="1153" y="417" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="720">State</text>
    <text x="1153" y="438" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">sessions</text>

    <rect x="830" y="480" width="125" height="70" rx="18" fill="#1E293B" stroke="#475569"/>
    <text x="858" y="511" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="720">Queue</text>
    <text x="858" y="532" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">durability</text>

    <rect x="977" y="480" width="125" height="70" rx="18" fill="#1E293B" stroke="#475569"/>
    <text x="1005" y="511" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="720">Provider</text>
    <text x="1005" y="532" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">stream LLM</text>

    <rect x="1125" y="480" width="125" height="70" rx="18" fill="#1E293B" stroke="#475569"/>
    <text x="1153" y="511" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="720">Traces</text>
    <text x="1153" y="532" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">OTel spans</text>

    <path d="M1040 356V386" stroke="#64748B" stroke-width="2"/>
    <path d="M1040 356C1040 371 893 371 893 386" stroke="#64748B" stroke-width="2"/>
    <path d="M1040 356C1040 371 1188 371 1188 386" stroke="#64748B" stroke-width="2"/>
    <path d="M1040 456V480" stroke="#64748B" stroke-width="2"/>
    <path d="M893 456V480" stroke="#64748B" stroke-width="2"/>
    <path d="M1188 456V480" stroke="#64748B" stroke-width="2"/>
  </g>

  <path d="M642 382C690 348 732 348 758 382" stroke="#7C3AED" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="700" y="335" text-anchor="middle" fill="#6D28D9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="760">move harness jobs</text>
  <text x="700" y="498" text-anchor="middle" fill="#78716C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600">same UI · same events · different runtime</text>

  <g>
    <rect x="380" y="666" width="640" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.72" stroke="#E7DCCB"/>
    <circle cx="416" cy="690" r="7" fill="#F59E0B"/>
    <text x="436" y="696" fill="#44403C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="650">Start thin for learning. Move right when durability, policy, budget, and traces become real.</text>
  </g>
