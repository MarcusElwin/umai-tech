<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 220" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="aura" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1100" height="220" fill="url(#bg)"/>

  <!-- Decorative orbs -->
  <circle cx="80" cy="40" r="140" fill="url(#glow)"/>
  <circle cx="980" cy="200" r="160" fill="url(#glow)" opacity="0.7"/>

  <!-- Japanese mark (umai) faint on right -->
  <text x="1075" y="60" font-size="34" font-weight="700" fill="#7C3AED" opacity="0.35" text-anchor="end">うまい</text>

  <!-- Eyebrow chip -->
  <g transform="translate(36,28)">
    <rect width="160" height="22" rx="11" fill="#7C3AED"/>
    <text x="80" y="15" text-anchor="middle" font-size="9" font-weight="700" fill="white" letter-spacing="2">AGENTIC DEV DAYS 2026</text>
  </g>

  <!-- Title row -->
  <text x="36" y="98" font-size="40" font-weight="800" fill="white" letter-spacing="-1">Building </text>
  <text x="201" y="98" font-size="40" font-weight="800" fill="url(#aura)" letter-spacing="-1">Aura</text>
  <text x="296" y="98" font-size="24" font-weight="600" fill="white" opacity="0.85">— An Agentic LLM Gateway in Rust</text>

  <!-- Tagline -->
  <text x="36" y="126" font-size="14" fill="#A78BFA" font-style="italic">Vibe engineering taught me Rust. Claude Code carried the rest.</text>

  <!-- Feature chips -->
  <g transform="translate(36,148)" font-size="11" font-weight="600">
    <g>
      <rect width="146" height="26" rx="13" fill="white" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/>
      <text x="73" y="17" text-anchor="middle" fill="white">Open Responses API</text>
    </g>
    <g transform="translate(154,0)">
      <rect width="98" height="26" rx="13" fill="white" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/>
      <text x="49" y="17" text-anchor="middle" fill="white">7 providers</text>
    </g>
    <g transform="translate(260,0)">
      <rect width="158" height="26" rx="13" fill="white" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/>
      <text x="79" y="17" text-anchor="middle" fill="white">cost on every response</text>
    </g>
    <g transform="translate(426,0)">
      <rect width="128" height="26" rx="13" fill="white" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/>
      <text x="64" y="17" text-anchor="middle" fill="white">Rust · Axum · Tokio</text>
    </g>
  </g>

  <!-- Author bottom-left -->
  <g transform="translate(36,188)">
    <circle cx="12" cy="12" r="12" fill="#7C3AED"/>
    <text x="12" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="white">M</text>
    <text x="32" y="11" font-size="11" font-weight="700" fill="white">Marcus Elwin</text>
    <text x="32" y="23" font-size="9" fill="#A78BFA">umai-tech.com · @MarcusElwin</text>
  </g>

  <!-- URL pill bottom-right -->
  <g transform="translate(940,178)">
    <rect width="124" height="28" rx="14" fill="#7C3AED"/>
    <text x="62" y="18" text-anchor="middle" font-size="12" font-weight="700" fill="white">aura-llm.dev</text>
  </g>
</svg>
